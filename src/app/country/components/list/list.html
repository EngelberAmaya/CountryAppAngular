<section class="mt-5">
  <table class="table table-md mt-2 w-full">
    <thead>
      <tr>
        <th>#</th>
        <th>Escudo de armas</th>
        <th>Bandera</th>
        <th>Nombre</th>
        <th>Capital</th>
        <th>Población</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      @for (country of countries(); track country.cca2; let index = $index) {
        <tr>
          <td>{{ index + 1 }}</td>
          <td>
            <img
                [src]="country.coatOfArmsSvg ? country.coatOfArmsSvg : noImageUrl"
                [alt]="country.name"
                class="w-9"
            />
          </td>
          <td>
            <img
                [src]="country.flagSvg ? country.flagSvg : noImageUrl"
                [alt]="country.name"
                class="w-10"
            />
          </td>
          <td>{{ country.name }}</td>
          <td>{{ country.capital }}</td>
          <td>
            <span class="badge badge-secondary">
              {{ country.population | number }}
            </span>
          </td>
          <td>
            <a href="" class="link-primary cursor-pointer">Más información</a>
          </td>
        </tr>
      }
    </tbody>
  </table>
</section>
