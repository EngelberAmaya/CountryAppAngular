<section class="mt-2 flex w-full flex-col gap-2 sm:flex-row sm:items-center">
  <input
    type="text"
    class="input input-bordered w-full sm:w-56 md:w-72"
    placeholder="{{placeholder()}}"
    autofocus
    #txtSearch
    (keyup.enter)="value.emit(txtSearch.value)"
    [value]="inputValue()"
  />

  <button
    class="btn btn-primary w-full sm:w-auto"
    (click)="value.emit(txtSearch.value)"
  >
    Buscar
  </button>
</section>
