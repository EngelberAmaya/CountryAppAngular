<h1 class="text-2xl font-bold">Por región</h1>
<h3 class="text-lg">Seleccione la región</h3>

<section class="mt-2 grid w-full grid-cols-1 gap-2 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-6">
  @for (region of regions; track region) {
    <button
      class="btn btn-outline w-full justify-center sm:w-auto"
      (click)="selectedRegion.set(region)"
      [class.btn-primary]="selectedRegion() === region"
    >
      {{ region }}
    </button>
  }
</section>


<app-list
  [countries]="countryResource.hasValue() ? countryResource.value() : []"
  [errorMessage]="countryResource.error()"
  [isEmpty]="countryResource.hasValue() ? countryResource.value().length === 0 : false"
  [isLoading]="countryResource.isLoading()"
  [initialMessage]="'Seleccione una región para ver los países'"
/>
