<div class="flex w-full justify-center">
  <button
    type="button"
    class="btn btn-circle btn-primary fixed top-22 left-6 z-50 shadow-lg"
    aria-label="Volver"
    (click)="goBack()"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 18l-6-6 6-6" />
    </svg>
  </button>

  <div class="mb-4 flex w-full max-w-3xl flex-col rounded-box bg-base-300">
    <!-- Image -->
    <!-- <div class="bg-[url({{ country().flagSvg }})] bg-center rounded-t-box w-full h-72"></div> -->
    <img
      src="{{ country().flagSvg }}"
      alt="{{ country().name }}"
      class="w-full object-cover rounded-t-box"
    >

    <!-- Body-->
    <div class="flex flex-col gap-6 p-6">

      <section class="stats shadow">

        <div class="stat place-items-center">
          <div class="stat-title">Nombre</div>
          <div class="stat-value text-primary">{{ country().name }}</div>
        </div>

        <div class="stat place-items-center">
          <div class="stat-title">Población</div>
          <div class="stat-value">{{ country().population | number }}</div>
          <div class="stat-desc">Desde {{ currentYear() }}</div>
        </div>

        <div class="stat place-items-center">
          <div class="stat-title">Región</div>
          <div class="stat-value text-primary">{{ country().region }}</div>
        </div>

      </section>

      <section class="stats shadow mx-5">

        <div class="stat place-items-center">
          <div class="stat-title">Sub Región</div>
          <div class="stat-value text-primary">{{ country().subRegion }}</div>
        </div>

        <div class="stat place-items-center">
          <div class="stat-title">Idioma</div>
          <div class="stat-value">{{ country().languages }}</div>
        </div>


        <div class="stat place-items-center">
          <div class="stat-title">Escudo de armas</div>
          <div class="stat-value">
             <img class="w-12" [alt]="country().name" [src]="country().coatOfArmsSvg" />
          </div>
        </div>

      </section>

    </div>
  </div>
</div>
